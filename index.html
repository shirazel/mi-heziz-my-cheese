                                            מטרת המשחק היא לפתח <strong>חוסן, גמישות מחשבתית ויכולת התמודדות</strong> עם שינויים בלתי צפויים.

        const ExitConfirmationModal = ({ isOpen, onConfirm, onCancel }) => {

        const ScreenRoulette = ({ onNext, players, currentPlayer }) => {
            const [rotation, setRotation] = useState(0);
            useEffect(() => {
                const slice = 360 / players.length;
                const selectedIndex = players.indexOf(currentPlayer.name);
                setRotation((360 * 6) + (360 - (selectedIndex * slice + slice / 2)));
                setTimeout(onNext, 5000);
            }, []);
            return (
                <div className="flex-1 flex flex-col items-center justify-center overflow-hidden text-center p-4">
                    <div className="relative w-64 h-64 md:w-[400px] md:h-[400px] mx-auto shrink-0 mb-8">
                        <div className="absolute -top-8 left-1/2 -translate-x-1/2 z-40"><svg width="40" height="40" viewBox="0 0 24 24" fill="#FACC15"><path d="M12 21L2 5h20z" /></svg></div>
                        <motion.div animate={{ rotate: rotation }} transition={{ duration: 4.5, ease: [0.12, 0.8, 0.2, 1] }} className="w-full h-full relative z-10">
                            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-2xl">
                                {players.map((p, i) => {
                                    const slice = 360 / players.length;
                                    const radsS = (i * slice - 90) * Math.PI / 180.0;
                                    const radsE = ((i + 1) * slice - 90) * Math.PI / 180.0;
                                    const d = `M 50 50 L ${50 + 50 * Math.cos(radsS)} ${50 + 50 * Math.sin(radsS)} A 50 50 0 0 1 ${50 + 50 * Math.cos(radsE)} ${50 + 50 * Math.sin(radsE)} Z`;
                                    return (
                                        <g key={i}>
                                            <path d={d} fill={i % 2 === 0 ? '#6D28D9' : '#5B21B6'} stroke="#FACC15" strokeWidth="0.5" />
                                            <text x="50" y="12" transform={`rotate(${i * slice + slice / 2} 50 50)`} fill="white" fontSize={players.length > 8 ? "3.5" : "4.5"} fontWeight="900" textAnchor="middle">{p}</text>
                                        </g>
                                    );
                                })}
                            </svg>
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 md:w-24 md:h-24 bg-[#14002E] rounded-full flex items-center justify-center border-2 border-[#FACC15] text-3xl z-20 shadow-inner text-center">🧀</div>
                        </motion.div>
                    </div>
                    <h2 className="text-2xl md:text-3xl font-black text-white tracking-widest animate-pulse pb-4 text-center">הגבינה מסתובבת...</h2>
                </div>
            );
        };

        const ScreenQuestionType = ({ onSelectType, currentPlayer }) => {
            const constraintsRef = useRef(null);
            const x = useMotionValue(0);
            const y = useMotionValue(0);
            const rG = useTransform(x, [40, 120], [0, 0.7]);
            const cG = useTransform(y, [-120, -40], [0.8, 0]);
            const lG = useTransform(x, [-120, -40], [0.7, 0]);
            const CardStyle = "w-24 h-40 md:w-44 md:h-64 flex flex-col items-center justify-center p-3 text-center border border-white/10";
            return (
                <div className="flex-1 flex flex-col items-center justify-center w-full max-w-5xl mx-auto px-4 text-center" ref={constraintsRef}>
                    <h2 className="text-2xl md:text-5xl font-bold text-white mb-3 text-center"><span className="text-[#FACC15]">{currentPlayer.name}</span>, לאן נזיז את הגבינה?</h2>
                    <p className="text-sm md:text-lg text-[#E9D5FF]/60 mb-6 text-center">גרור/י את הגבינה כלפי מעלה אל הקלף הנבחר</p>
                    <div className="relative w-full flex flex-col items-center gap-8 overflow-visible mt-2 text-center">
                        <div className="flex justify-center items-end gap-3 md:gap-6 overflow-visible text-center">
                            <div className="relative text-center"><motion.div style={{ opacity: rG }} className="absolute inset-0 bg-orange-500 blur-[40px] rounded-full" />
                                <GlassCard className={`${CardStyle} border-orange-400/20 bg-orange-500/5`}>
                                    <div className="mb-8"><Icons.BookOpen color="#FACC15" size={48} /></div>
                                    <span className="text-xs md:text-lg font-bold text-white leading-tight text-center">קלף הסיפור</span>
                                </GlassCard></div>
                            <div className="relative text-center"><motion.div style={{ opacity: cG }} className="absolute inset-0 bg-blue-500 blur-[40px] rounded-full" />
                                <GlassCard className={`${CardStyle} border-blue-400/20 bg-blue-500/5`}>
                                    <div className="mb-8"><Icons.Heart color="#FACC15" size={48} /></div>
                                    <span className="text-xs md:text-lg font-bold text-white leading-tight text-center">קלף השיתוף</span>
                                </GlassCard></div>
                            <div className="relative text-center"><motion.div style={{ opacity: lG }} className="absolute inset-0 bg-[#FACC15] blur-[40px] rounded-full" />
                                <GlassCard className={`${CardStyle} border-[#FACC15]/20 bg-[#FACC15]/5`}>
                                    <div className="mb-8"><Icons.Zap color="#FACC15" size={48} /></div>
                                    <span className="text-xs md:text-lg font-black text-white leading-tight text-center">קלף האומץ</span>
                                </GlassCard></div>
                        </div>
                        <div className="h-20 shrink-0 text-center"><motion.div drag dragConstraints={constraintsRef} dragElastic={0.1} onDragEnd={(_, info) => { if (info.offset.y < -50) { if (info.offset.x > 60) onSelectType('story'); else if (info.offset.x < -60) onSelectType('courage'); else onSelectType('sharing'); } }} style={{ x, y }} className="cursor-grab text-7xl md:text-8xl drop-shadow-[0_10px_30px_rgba(250,204,21,0.5)] text-center text-center">🧀</motion.div></div>
                        <div className="text-[#FACC15] animate-pulse flex items-center gap-2 text-sm justify-center text-center"><Icons.ArrowUp /> גרור/י למעלה לבחירה</div>
                    </div>
                </div>
            );
        }

        function ScreenQuestion({ onEndTurn, question, type, onRefresh, currentPlayer }) {
            const [isP, setIsP] = useState(false);
            const conf = { sharing: { l: 'קלף השיתוף', i: Icons.Heart, c: 'from-blue-500/20', a: 'text-blue-200' }, story: { l: 'קלף הסיפור', i: Icons.BookOpen, c: 'from-orange-500/20', a: 'text-orange-200' }, courage: { l: 'קלף האומץ', i: Icons.Zap, c: 'from-[#FACC15]/20', a: 'text-[#FACC15]' } }[type];
            return (
                <div className="flex-1 flex flex-col items-center justify-center w-full max-w-4xl mx-auto px-6 text-center text-center">
                    <AnimatePresence mode="wait">
                        {!isP ? (
                            <motion.div key="q" className="w-full flex flex-col items-center text-center text-center">
                                <GlassCard className={`p-8 md:p-12 min-h-[220px] flex flex-col items-center justify-center w-full bg-gradient-to-b ${conf.c} to-transparent border-[#FACC15]/10 shadow-2xl text-center`}>
                                    <div className={`mb-6 flex items-center gap-3 ${conf.a} font-black text-xl md:text-2xl justify-center text-center text-center`}><conf.i color="#FACC15" size={40}/> {conf.l}</div>
                                    <h2 className="text-xl md:text-3xl font-bold text-white leading-relaxed text-center">{question}</h2>
                                </GlassCard>
                                <div className="flex flex-col md:flex-row gap-4 mt-8 justify-center text-center text-center">
                                    <button onClick={onRefresh} className="bg-white/10 text-white border border-white/20 px-8 py-2.5 rounded-full flex items-center gap-2 hover:bg-white/20 transition-all text-sm justify-center text-center"><Icons.Refresh /> החלף/י קלף</button>
                                    <ButtonPrimary onClick={() => setIsP(true)} icon={Icons.Users} className="min-w-[250px] text-center">זמן מעגל עמיתים</ButtonPrimary>
                                </div>
                            </motion.div>
                        ) : (
                            <motion.div key="p" className="w-full flex flex-col items-center text-center text-center">
                                <GlassCard className="p-8 md:p-10 w-full border-[#FACC15]/20 bg-white/[0.02] text-center text-center">
                                    <h3 className="text-xl md:text-2xl font-bold text-[#FACC15] mb-6 text-center text-center">זמן מעגל עמיתים</h3>
                                    <p className="text-lg md:text-xl text-white/80 mb-10 text-center text-center">לאחר השיתוף, 3 משתתפים/ות מוזמנים/ות להגיב ל{currentPlayer.name}:</p>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
                                        <div className="bg-white/5 border border-white/10 p-5 rounded-2xl flex flex-col items-center gap-3 text-center text-center"><Icons.Lightbulb color="#FACC15" size={40}/><span className="text-lg font-bold text-white text-center">לייעץ</span></div>
                                        <div className="bg-white/5 border border-white/10 p-5 rounded-2xl flex flex-col items-center gap-3 text-center text-center"><Icons.ShareBubbles color="#93c5fd" size={40}/><span className="text-lg font-bold text-white text-center">לשתף</span></div>
                                        <div className="bg-white/5 border border-white/10 p-5 rounded-2xl flex flex-col items-center gap-3 text-center text-center"><Icons.Heart color="#f9a8d4" size={40}/><span className="text-lg font-bold text-white text-center">לחזק</span></div>
                                    </div>
                                </GlassCard>
                                <div className="mt-8 flex justify-center text-center text-center"><ButtonPrimary onClick={onEndTurn} icon={Icons.Refresh}>סיימנו, סובב/י למי הבא!</ButtonPrimary></div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        }

        function ScreenSummary({ stats, pCount }) {
            return (
                <div className="flex-1 flex flex-col items-center justify-center text-center px-6 text-center text-center">
                    <div className="flex justify-center scale-75 md:scale-90 text-center"><Icons.Trophy /></div>
                    <h1 className="text-3xl md:text-5xl font-black text-white mb-3 mt-4 text-center">היה מדהים!</h1>
                    <p className="text-lg md:text-xl text-[#E9D5FF] mb-8 text-center text-center">למדתם/ן שלא צריך לפחד משינויים</p>
                    <div className="flex gap-4 mb-10 justify-center text-center">
                        <GlassCard className="p-5 px-8 flex flex-col items-center min-w-[140px] text-center text-center text-center text-center text-center text-center text-center text-center"><span className="text-3xl font-bold text-[#FACC15] mb-1 text-center">{pCount}</span><span className="text-white/60 text-sm text-center">משתתפים/ות</span></GlassCard>
                        <GlassCard className="p-5 px-8 flex flex-col items-center min-w-[140px] text-center text-center text-center text-center text-center text-center text-center text-center text-center text-center"><span className="text-3xl font-bold text-[#6D28D9] mb-1 text-center">{stats.questionsAnswered}</span><span className="text-white/60 text-sm text-center text-center">שאלות</span></GlassCard>
                    </div>
                    <div className="flex justify-center text-center text-center"><ButtonPrimary onClick={() => window.location.reload()} icon={Icons.Refresh}>משחק חדש</ButtonPrimary></div>
                </div>
            );
        }

        // --- האפליקציה הראשית ---
        function App() {
            const [screen, setScreen] = useState(1);
            const [audience, setAudience] = useState(null);
            const [players, setPlayers] = useState([]);
            const [availablePlayers, setAvailablePlayers] = useState([]);
            const [currentP, setCurrentP] = useState({ name: "", target: "" });
            const [qType, setQType] = useState(null);
            const [currentQ, setCurrentQ] = useState("");
            const [stats, setStats] = useState({ questionsAnswered: 0 });
            const [usageCount, setUsageCount] = useState(0);
            const [isInfoOpen, setIsInfoOpen] = useState(false);
            const [isExitModalOpen, setIsExitModalOpen] = useState(false);
            const [pendingAction, setPendingAction] = useState(null);
            const [dbInstance, setDbInstance] = useState(null);
            const [user, setUser] = useState(null);
            const [hasCountedSession, setHasCountedSession] = useState(false);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'cheese-game-pisgah-v1';

            // --- לוגיקת Firebase ---
            useEffect(() => {
                const initFB = async () => {
                    if (window.FB_INIT) {
                        const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, onSnapshot, firebaseConfig } = window.FB_INIT;
                        
                        const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : firebaseConfig;
                        
                        if (!config || !config.apiKey) return;

                        try {
                            const fbApp = initializeApp(config);
                            const fbAuth = getAuth(fbApp);
                            const fbDb = getFirestore(fbApp);
                            setDbInstance(fbDb);

                            // תופסים בשקט את בעיית ההרשאות - המשחק ימשיך לעבוד גם בלעדיו
                            signInAnonymously(fbAuth).catch(() => {});
                            
                            onAuthStateChanged(fbAuth, (u) => {
                                setUser(u);
                                if (u) {
                                    try {
                                        onSnapshot(doc(fbDb, 'artifacts', appId, 'public', 'data', 'stats', 'global'), (snap) => {
                                            if (snap.exists()) setUsageCount(snap.data().plays || 0);
                                        }, (err) => {});
                                    } catch(e){}
                                }
                            });
                        } catch (err) {
                            // שקט - מאפשר למשחק לעבוד בצורה לוקאלית אם המסד נכשל
                        }
                    }
                };
                initFB();
            }, []);

            const incrementPlays = async () => {
                if (!window.FB_INIT || !user || hasCountedSession || !dbInstance) return;
                const { doc, getDoc, updateDoc, setDoc, increment } = window.FB_INIT;
                const statsDoc = doc(dbInstance, 'artifacts', appId, 'public', 'data', 'stats', 'global');
                
                try {
                    const snap = await getDoc(statsDoc);
                    if (snap.exists()) {
                        await updateDoc(statsDoc, { plays: increment(1) });
                    } else {
                        await setDoc(statsDoc, { plays: 1 });
                    }
                    setHasCountedSession(true);
                } catch (e) {} // ממשיכים בשקט במקרה של שגיאה
            };

            const handleExitRequest = (targetScreen) => {
                if (screen >= 4 && screen <= 7) {
                    setPendingAction(() => () => setScreen(targetScreen));
                    setIsExitModalOpen(true);
                } else {
                    setScreen(targetScreen);
                }
            };

            const confirmExit = () => {
                if (pendingAction) pendingAction();
                setIsExitModalOpen(false);
                setPendingAction(null);
            };

            const getNamesFromInput = () => {
                const input = document.getElementById('playerInput');
                if (!input) return [];
                return input.value.split(/[,\n]+/).map(n => n.trim()).filter(n => n.length > 0);
            };

            const pickNextPlayer = (fullList) => {
                let pool = fullList || (availablePlayers.length === 0 ? players : availablePlayers);
                if (pool.length === 0 && players.length > 0) pool = [...players];
                const randomIndex = Math.floor(Math.random() * pool.length);
                const selected = pool[randomIndex];
                setAvailablePlayers(pool.filter(p => p !== selected));
                setCurrentP({ name: selected, target: selected });
                setScreen(4);
            };

            const handleStart = () => {
                const unsaved = getNamesFromInput();
                const final = Array.from(new Set([...players, ...unsaved]));
                if (final.length < 2) return;
                setPlayers(final);
                incrementPlays();
                pickNextPlayer(final);
            };

            const renderContent = () => {
                switch (screen) {
                    case 1: return (
                        <div className="flex-1 flex flex-col items-center justify-center text-center px-6">
                            <motion.div initial={{ scale: 0.8 }} animate={{ scale: 1 }} className="text-8xl md:text-[100px] mb-6 drop-shadow-[0_0_30px_rgba(250,204,21,0.6)] text-center">🧀</motion.div>
                            <h1 className="text-4xl md:text-6xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-b from-white to-[#E9D5FF] text-center">מי הזיז את הגבינה שלי</h1>
                            <p className="text-lg md:text-2xl font-light text-[#E9D5FF] mb-10 text-center">מה הייתם עושים אם לא הייתם מפחדים?</p>
                            <ButtonPrimary onClick={() => setScreen(2)}>התחילו לשחק</ButtonPrimary>
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="mt-8 bg-white/5 px-5 py-2 rounded-full border border-white/10 text-white/50 text-xs flex items-center gap-2">
                                <Icons.Users size={14}/><span className="text-[#FACC15] font-bold">{usageCount}</span> משחקים שוחקו עד היום
                            </motion.div>
                        </div>
                    );
                    case 2: return (
                        <div className="flex-1 flex flex-col items-center justify-center w-full max-w-5xl mx-auto px-6 text-center text-center text-center">
                            <h2 className="text-3xl md:text-4xl font-bold text-white mb-10 text-center">מי משחק היום?</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl mx-auto text-center text-center">
                                <GlassCard className={`p-8 flex flex-col items-center text-center gap-4 ${audience === 'teachers' ? 'ring-2 ring-[#FACC15]/20 shadow-[0_0_15px_rgba(250,204,21,0.1)]' : ''}`} onClick={() => setAudience('teachers')}>
                                    <div className={`p-5 rounded-full ${audience === 'teachers' ? 'bg-[#FACC15] text-[#14002E]' : 'bg-white/5 text-[#E9D5FF]'}`}><Icons.Graduation /></div>
                                    <h3 className="text-xl font-bold text-white">מורים ומורות</h3>
                                </GlassCard>
                                <GlassCard className={`p-8 flex flex-col items-center text-center gap-4 ${audience === 'students' ? 'ring-2 ring-[#FACC15]/20 shadow-[0_0_15px_rgba(250,204,21,0.1)]' : ''}`} onClick={() => setAudience('students')}>
                                    <div className={`p-5 rounded-full ${audience === 'students' ? 'bg-[#FACC15] text-[#14002E]' : 'bg-white/5 text-[#E9D5FF]'}`}><Icons.Users /></div>
                                    <h3 className="text-xl font-bold text-white text-center">תלמידים ותלמידות</h3>
                                </GlassCard>
                            </div>
                            {audience && <div className="mt-10 flex justify-center text-center text-center"><ButtonPrimary onClick={() => setScreen(3)} icon={Icons.ChevronLeft}>המשך</ButtonPrimary></div>}
                        </div>
                    );
                    case 3: return (
                        <div className="flex-1 flex flex-col items-center justify-center w-full max-w-3xl mx-auto px-6 text-center text-center">
                            <h2 className="text-3xl font-bold text-white mb-6 text-center text-center">הכנסת שמות המשתתפים</h2>
                            <GlassCard hoverEffect={false} className="w-full p-6 mb-6 text-center text-center">
                                <div className="flex flex-col md:flex-row gap-4 text-center">
                                    <textarea id="playerInput" placeholder="שמות (מופרדים בפסיק או שורה)..." className="flex-1 bg-white/5 border border-white/10 rounded-2xl p-4 text-white text-lg placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-[#FACC15] h-20 resize-none text-center" dir="rtl" />
                                    <button onClick={() => {
                                        const names = getNamesFromInput();
                                        setPlayers(prev => Array.from(new Set([...prev, ...names])));
                                        document.getElementById('playerInput').value = "";
                                    }} className="bg-[#6D28D9] text-white rounded-2xl px-8 font-bold md:w-32 h-12 md:h-auto hover:bg-[#7c3aed] text-center text-center text-center">הוסף</button>
                                </div>
                                <div className="flex flex-wrap gap-2 mt-4 max-h-32 overflow-y-auto custom-scrollbar justify-center text-center">
                                    {players.map(p => (
                                        <div key={p} className="flex items-center gap-2 bg-white/10 rounded-full px-3 py-1 text-white border border-white/5 text-sm">
                                            <span>{p}</span><button onClick={() => setPlayers(players.filter(name => name !== p))} className="text-white/40 hover:text-red-400">×</button>
                                        </div>
                                    ))}
                                </div>
                            </GlassCard>
                            <ButtonPrimary onClick={handleStart} icon={Icons.CheckCircle2}>התחילו את המשחק</ButtonPrimary>
                        </div>
                    );
                    case 4: return <ScreenRoulette onNext={() => setScreen(5)} players={players} currentPlayer={currentP} />;
                    case 5: return (
                        <div className="flex-1 flex flex-col items-center justify-center text-center px-6 text-center">
                            <p className="text-2xl text-[#E9D5FF] mb-4 text-center text-center">התור של...</p>
                            <h1 className="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-b from-[#FACC15] to-[#fff3b0] mb-12 drop-shadow-2xl text-center text-center">{currentP.name}!</h1>
                            <ButtonPrimary onClick={() => setScreen(6)} icon={Icons.ChevronLeft}>קדימה, בחר/י קלף</ButtonPrimary>
                        </div>
                    );
                    case 6: return <ScreenQuestionType onSelectType={(t) => { setQType(t); setCurrentQ(QUESTIONS[audience][t][Math.floor(Math.random() * QUESTIONS[audience][t].length)]); setScreen(7); }} currentPlayer={currentP} />;
                    case 7: return <ScreenQuestion onEndTurn={() => { setStats(s => ({ ...s, questionsAnswered: s.questionsAnswered + 1 })); setCurrentQ(""); pickNextPlayer(); }} question={currentQ} type={qType} onRefresh={() => setCurrentQ(QUESTIONS[audience][qType][Math.floor(Math.random() * QUESTIONS[audience][qType].length)])} currentPlayer={currentP} />;
                    case 8: return <ScreenSummary stats={stats} pCount={players.length} />;
                }
            };

            return (
                <div className="h-screen w-full bg-[#14002E] text-right flex flex-col relative overflow-hidden" dir="rtl">
                    <Background />
                    <InstructionsModal isOpen={isInfoOpen} onClose={() => setIsInfoOpen(false)} />
                    <ExitConfirmationModal 
                        isOpen={isExitModalOpen} 
                        onConfirm={confirmExit} 
                        onCancel={() => setIsExitModalOpen(false)} 
                    />
                    
                    <header className="p-4 md:p-6 flex justify-between items-center z-[100] relative shrink-0">
                        {/* צד ימין - לוגו */}
                        <button onClick={() => handleExitRequest(1)} className="flex items-center gap-2 opacity-60 hover:opacity-100 pointer-events-auto shrink-0 transition-opacity order-first">
                            <span className="text-xl">🧀</span><span className="text-white font-bold hidden md:block">מי הזיז את הגבינה שלי</span>
                        </button>
                        
                        {/* צד שמאל - כפתורים */}
                        <div className="flex gap-2 md:gap-3 pointer-events-auto text-center">
                            <button onClick={() => setIsInfoOpen(true)} className="flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/10 text-white border border-white/20 font-medium text-xs md:text-sm backdrop-blur-md hover:bg-white/20 transition-all text-center"><Icons.Info /> הוראות</button>
                            {screen > 3 && screen < 8 && (
                                <button onClick={() => handleExitRequest(8)} className="bg-white/5 text-white/70 px-4 py-1.5 rounded-full border border-white/10 text-xs md:text-sm backdrop-blur-md hover:bg-white/10 transition-colors text-center">סיים משחק</button>
                            )}
                        </div>
                    </header>
                    <main className="relative flex-1 flex flex-col overflow-hidden text-center text-center">
                        <AnimatePresence mode="wait text-center text-center"><motion.div className="flex-1 flex flex-col text-center" key={screen} initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }}>{renderContent()}</motion.div></AnimatePresence>
                    </main>
                    <footer className="p-4 text-center z-50 relative pointer-events-none shrink-0 text-center"><a href="https://www.pisgah.org.il/" target="_blank" rel="noopener noreferrer" className="pointer-events-auto inline-flex items-center gap-2 text-white/20 hover:text-[#FACC15] text-xs transition-colors">באהבה מפסג"ה חדרה <Icons.External /></a></footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        // כאן הכנסנו את הקוד שלך ישירות:
        const firebaseConfig = {
            apiKey: "AIzaSyCG-K6TMoRNut6kBKqYjDnenWydYcfeapM",
            authDomain: "cheese-game-5ac92.firebaseapp.com",
            projectId: "cheese-game-5ac92",
            storageBucket: "cheese-game-5ac92.firebasestorage.app",
            messagingSenderId: "238630590497",
            appId: "1:238630590497:web:2a16a3b3fde9a909c2ab60"
        };
        
        window.FB_INIT = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, updateDoc, increment, onSnapshot, firebaseConfig };
    </script>
</body>
</html>
