                    "עשה/י השבוע משהו אחד שרצית לעשות הרבה זמן ולא העזת עד עכשיו.",
                    "בחר/י משהו שקשה לך במיוחד להתמודד איתו – ונסה/י אותו השבוע בכוונה.",
                    "חשב/י על משהו שאת/ה פוחד/ת להיכשל בו. מה הצעד הראשון הקטן שתעשה/י מחר?",
                    "בחר/י הרגל אחד קבוע שלך ושנה/י אותו השבוע ליום אחד (למשל: מקום ישיבה).",
                    "זהה/י פחד אחד שמעכב אותך – ונסה/י להתעמת איתו בדרך יצירתית השבוע.",
                    "צא/י מאזור הנוחות שלכם במשהו קטן כבר מחר בבוקר.",
                    "הצע/י רעיון חדש או הבע/י דעה במקום שבו את/ה בדרך כלל בוחר/ת לשתוק.",
                    "פנה/י למישהו/י שאת/ה לא מכיר/ה ונסה/י ליצור איתם שיחה ראשונית קצרה.",
                    "נסה/י ללמוד מיומנות חדשה שאת/ה בטוח/ה שאת/ה 'גרוע/ה' בה (כמו ציור או שירה).",
                    "בחר/י 'חוק' אחד שקבעת לעצמך על עצמך ונסה/י לשבור אותו השבוע.",
                    "בקש/י משוב אמיץ מחבר/ה: 'מה דבר אחד שאני יכול/ה לשנות כדי להיות חבר/ה טוב/ה יותר?'.",
                    "קח/י משימה שאת/ה דוחה כבר המון זמן בגלל חשש או חוסר ביטחון – ועשה/י אותה היום.",
                    "עמוד/י על שלך בנושא שחשוב לך, גם אם שאר הקבוצה חושבת אחרת.",
                    "בחר/י מישהו/י שחשוב/ה לך וספר/י להם משהו אמיץ שלא אמרתם להם מעולם.",
                    "השלם/י לעצמך: 'אם לא הייתי מפחד/ת, הייתי מרשה לעצמי להיות יותר...' – עשה/י צעד אחד בכיוון."
                ]
            }
        };

        // --- UI Components ---
        const Background = () => (
            <div className="absolute inset-0 z-0 overflow-hidden bg-[#14002E] pointer-events-none">
                <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(109,40,217,0.15)_0%,rgba(11,0,24,1)_100%)]" />
                <motion.div animate={{ y: [0, -40, 0], opacity: [0.3, 0.5, 0.3] }} transition={{ duration: 8, repeat: Infinity }} className="absolute top-[20%] left-[20%] w-96 h-96 bg-[#6D28D9] rounded-full filter blur-[120px] opacity-30" />
                <motion.div animate={{ y: [0, 50, 0], opacity: [0.2, 0.4, 0.2] }} transition={{ duration: 10, repeat: Infinity, delay: 1 }} className="absolute bottom-[20%] right-[10%] w-[500px] h-[500px] bg-[#FACC15] rounded-full filter blur-[150px] opacity-20" />
            </div>
        );

        const GlassCard = ({ children, className = "", onClick, hoverEffect = true }) => (
            <motion.div
                onClick={onClick}
                whileHover={hoverEffect ? { scale: 1.05, rotateX: 1, rotateY: 1 } : {}}
                whileTap={hoverEffect ? { scale: 0.95 } : {}}
                className={`relative rounded-3xl backdrop-blur-xl border border-white/10 shadow-2xl transition-all duration-300 ${onClick ? 'cursor-pointer' : ''} ${className}`}
            >
                <div className="absolute inset-0 bg-white/[0.03] rounded-3xl -z-10" />
                {children}
            </motion.div>
        );

        const ButtonPrimary = ({ children, onClick, icon: Icon, className = "" }) => (
            <motion.button
                whileHover={{ scale: 1.05, boxShadow: "0 0 30px rgba(250,204,21,0.4)" }}
                whileTap={{ scale: 0.95 }}
                onClick={onClick}
                className={`flex items-center justify-center gap-3 px-8 py-3 rounded-full bg-gradient-to-r from-[#FACC15] to-[#EAB308] text-[#0B0018] font-bold text-lg shadow-xl transition-all ${className}`}
            >
                {Icon && <Icon />}
                {children}
            </motion.button>
        );

        const InstructionsModal = ({ isOpen, onClose }) => (
            <AnimatePresence>
                {isOpen && (
                    <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
                        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={onClose} className="absolute inset-0 bg-[#0B0018]/90 backdrop-blur-md" />
                        <motion.div initial={{ scale: 0.9, opacity: 0, y: 20 }} animate={{ scale: 1, opacity: 1, y: 0 }} exit={{ scale: 0.9, opacity: 0, y: 20 }} className="relative w-full max-w-2xl bg-white/[0.05] border border-white/20 backdrop-blur-2xl rounded-[40px] shadow-2xl p-8 md:p-10 max-h-[85vh] overflow-y-auto custom-scrollbar">
                            <button onClick={onClose} className="absolute top-6 left-6 text-white/50 hover:text-white transition-colors z-10"><Icons.X /></button>
                            <div className="text-center mb-6">
                                <h2 className="text-2xl font-black text-white">מדריך המשחק</h2>
                            </div>
                            <div className="space-y-6 text-white leading-relaxed text-right">
                                <section className="bg-white/5 p-5 rounded-2xl border border-white/10">
                                    <h3 className="text-[#FACC15] font-bold text-lg mb-2">הרקע והמשמעות הפדגוגית</h3>
                                    <p className="text-white/80 text-sm">
                                        המשחק מבוסס על רב המכר של ספנסר ג'ונסון, <strong>"מי הזיז את הגבינה שלי"</strong>. 
                                        מטרת המשחק היא לפתח <strong>חוסן, גמישות מחשבתית ויכולת התמודדות</strong> עם שינויים בלתי צפויים.
                                    </p>
                                    <p className="text-[#FACC15] font-bold mt-2 text-center text-sm">המשחק מיועד להקרנה על מסך בכיתה או בזום.</p>
                                </section>
                                <section className="space-y-3">
                                    <h3 className="text-white font-bold text-lg border-r-4 border-[#FACC15] pr-3">איך משחקים?</h3>
                                    <ul className="pr-5 mt-2 space-y-3 text-white/70 text-sm">
                                        <li className="flex items-start gap-3"><Icons.BookOpen color="#fbbf24" size={18}/><span><strong className="text-orange-400">קלף הסיפור:</strong> התמודדות עם מצבי אמת היפותטיים.</span></li>
                                        <li className="flex items-start gap-3"><Icons.Heart color="#fbbf24" size={18}/><span><strong className="text-blue-400">קלף השיתוף:</strong> שיתוף אישי מהעבר לבניית אמון.</span></li>
                                        <li className="flex items-start gap-3"><Icons.Zap color="#fbbf24" size={18}/><span><strong className="text-[#FACC15]">קלף האומץ:</strong> אתגר מעשי ליציאה מאזור הנוחות.</span></li>
                                    </ul>
                                </section>
                                <div className="pt-4 text-center">
                                    <ButtonPrimary onClick={onClose}>הבנתי, בואו נתחיל!</ButtonPrimary>
                                </div>
                            </div>
                        </motion.div>
                    </div>
                )}
            </AnimatePresence>
        );

        // --- Main App ---
        function App() {
            const [screen, setScreen] = useState(1);
            const [audience, setAudience] = useState(null);
            const [players, setPlayers] = useState([]);
            const [availablePlayers, setAvailablePlayers] = useState([]);
            const [currentP, setCurrentP] = useState({ name: "", target: "" });
            const [qType, setQType] = useState(null);
            const [currentQ, setCurrentQ] = useState("");
            const [stats, setStats] = useState({ questionsAnswered: 0 });
            const [usageCount, setUsageCount] = useState(0);
            const [isInfoOpen, setIsInfoOpen] = useState(false);
            const [user, setUser] = useState(null);
            const [hasCountedSession, setHasCountedSession] = useState(false);

            const appId = typeof __app_id !== 'undefined' ? __app_id : 'cheese-game-pisgah-v1';

            useEffect(() => {
                if (window.FB_INIT) {
                    const { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, onSnapshot } = window.FB_INIT;
                    const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "" };
                    if (!config.apiKey) return;
                    const fbApp = initializeApp(config);
                    const fbAuth = getAuth(fbApp);
                    const fbDb = getFirestore(fbApp);

                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(fbAuth, __initial_auth_token);
                        } else {
                            await signInAnonymously(fbAuth);
                        }
                    };
                    initAuth().catch(() => {});
                    onAuthStateChanged(fbAuth, (u) => {
                        setUser(u);
                        if (u) {
                            onSnapshot(doc(fbDb, 'artifacts', appId, 'public', 'data', 'stats', 'global'), (snap) => {
                                if (snap.exists()) setUsageCount(snap.data().plays || 0);
                            });
                        }
                    });
                }
            }, []);

            const incrementPlays = async () => {
                if (!window.FB_INIT || !user || hasCountedSession) return;
                const { getFirestore, doc, getDoc, updateDoc, setDoc, increment, initializeApp } = window.FB_INIT;
                const config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { apiKey: "" };
                const fbApp = initializeApp(config);
                const fbDb = getFirestore(fbApp);
                const statsDoc = doc(fbDb, 'artifacts', appId, 'public', 'data', 'stats', 'global');
                try {
                    const snap = await getDoc(statsDoc);
                    if (snap.exists()) await updateDoc(statsDoc, { plays: increment(1) });
                    else await setDoc(statsDoc, { plays: 1 });
                    setHasCountedSession(true);
                } catch (e) {}
            };

            const pickNextPlayer = () => {
                let pool = availablePlayers.length === 0 ? [...players] : [...availablePlayers];
                const randomIndex = Math.floor(Math.random() * pool.length);
                const selected = pool[randomIndex];
                setAvailablePlayers(pool.filter(p => p !== selected));
                setCurrentP({ name: selected, target: selected });
                setScreen(4);
            };

            const renderContent = () => {
                switch (screen) {
                    case 1: return (
                        <div className="flex-1 flex flex-col items-center justify-center text-center px-6">
                            <motion.div initial={{ scale: 0.8 }} animate={{ scale: 1 }} className="text-8xl md:text-[100px] mb-6 drop-shadow-[0_0_30px_rgba(250,204,21,0.6)]">🧀</motion.div>
                            <h1 className="text-4xl md:text-6xl font-black mb-4 text-transparent bg-clip-text bg-gradient-to-b from-white to-[#E9D5FF]">מי הזיז את הגבינה שלי</h1>
                            <p className="text-lg md:text-2xl font-light text-[#E9D5FF] mb-10">מה הייתם עושים אם לא הייתם מפחדים?</p>
                            <ButtonPrimary onClick={() => setScreen(2)}>התחילו לשחק</ButtonPrimary>
                            {usageCount > 0 && (
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="mt-8 bg-white/5 px-5 py-2 rounded-full border border-white/10 text-white/50 text-xs flex items-center gap-2">
                                    <Icons.Users size={14}/><span className="text-[#FACC15] font-bold">{usageCount}</span> משחקים שוחקו עד היום
                                </motion.div>
                            )}
                        </div>
                    );
                    case 2: return (
                        <div className="flex-1 flex flex-col items-center justify-center w-full max-w-5xl mx-auto px-6">
                            <h2 className="text-3xl md:text-4xl font-bold text-white mb-10 text-center">מי משחק היום?</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl mx-auto">
                                <GlassCard className={`p-10 flex flex-col items-center text-center gap-6 ${audience === 'teachers' ? 'ring-2 ring-[#FACC15]/30' : ''}`} onClick={() => setAudience('teachers')}>
                                    <div className={`p-6 rounded-full ${audience === 'teachers' ? 'bg-[#FACC15] text-[#14002E]' : 'bg-white/5 text-[#E9D5FF]'}`}><Icons.Graduation /></div>
                                    <h3 className="text-2xl font-bold text-white">מורים ומורות</h3>
                                </GlassCard>
                                <GlassCard className={`p-10 flex flex-col items-center text-center gap-6 ${audience === 'students' ? 'ring-2 ring-[#FACC15]/30' : ''}`} onClick={() => setAudience('students')}>
                                    <div className={`p-6 rounded-full ${audience === 'students' ? 'bg-[#FACC15] text-[#14002E]' : 'bg-white/5 text-[#E9D5FF]'}`}><Icons.Users /></div>
                                    <h3 className="text-2xl font-bold text-white">תלמידים ותלמידות</h3>
                                </GlassCard>
                            </div>
                            {audience && <div className="mt-12 flex justify-center"><ButtonPrimary onClick={() => setScreen(3)} icon={Icons.ChevronLeft}>המשך</ButtonPrimary></div>}
                        </div>
                    );
                    case 3: return (
                        <div className="flex-1 flex flex-col items-center justify-center w-full max-w-3xl mx-auto px-6">
                            <h2 className="text-3xl font-bold text-white mb-8 text-center text-center">הכנסת שמות המשתתפים</h2>
                            <GlassCard hoverEffect={false} className="w-full p-6 mb-8 text-center text-center">
                                <div className="flex flex-col md:flex-row gap-4 text-center">
                                    <textarea id="playerInput" placeholder="שמות (מופרדים בפסיק או שורה)..." className="flex-1 bg-white/5 border border-white/10 rounded-2xl p-4 text-white text-lg placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-[#FACC15] h-20 resize-none text-center" dir="rtl" />
                                    <button onClick={() => {
                                        const val = document.getElementById('playerInput').value;
                                        if (!val.trim()) return;
                                        const names = val.split(/[,\n]+/).map(n => n.trim()).filter(n => n.length > 0);
                                        setPlayers(prev => Array.from(new Set([...prev, ...names])));
                                        document.getElementById('playerInput').value = "";
                                    }} className="bg-[#6D28D9] text-white rounded-2xl px-8 font-bold md:w-32 h-12 md:h-auto hover:bg-[#7c3aed]">הוסף</button>
                                </div>
                                <div className="flex flex-wrap gap-2 mt-4 max-h-32 overflow-y-auto custom-scrollbar justify-center text-center">
                                    {players.map(p => (
                                        <div key={p} className="flex items-center gap-2 bg-white/10 rounded-full px-3 py-1 text-white border border-white/5 text-sm">
                                            <span>{p}</span><button onClick={() => setPlayers(players.filter(name => name !== p))} className="text-white/40 hover:text-red-400">×</button>
                                        </div>
                                    ))}
                                </div>
                            </GlassCard>
                            {players.length >= 2 && <div className="flex justify-center text-center"><ButtonPrimary onClick={() => { incrementPlays(); setAvailablePlayers([...players]); pickNextPlayer(); }} icon={Icons.CheckCircle2}>התחילו את המשחק</ButtonPrimary></div>}
                        </div>
                    );
                    case 4: return <ScreenRoulette onNext={() => setScreen(5)} players={players} currentPlayer={currentP} />;
                    case 5: return (
                        <div className="flex-1 flex flex-col items-center justify-center text-center px-6">
                            <p className="text-2xl text-[#E9D5FF] mb-4">התור של...</p>
                            <h1 className="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-b from-[#FACC15] to-[#fff3b0] mb-12 drop-shadow-2xl">{currentP.name}!</h1>
                            <ButtonPrimary onClick={() => setScreen(6)} icon={Icons.ChevronLeft}>קדימה, בחר/י קלף</ButtonPrimary>
                        </div>
                    );
                    case 6: return <ScreenQuestionType onSelectType={(t) => { setQType(t); setCurrentQ(QUESTIONS[audience][t][Math.floor(Math.random() * QUESTIONS[audience][t].length)]); setScreen(7); }} currentPlayer={currentP} />;
                    case 7: return <ScreenQuestion onEndTurn={() => { setStats(s => ({ ...s, questionsAnswered: s.questionsAnswered + 1 })); setCurrentQ(""); pickNextPlayer(); }} question={currentQ} type={qType} onRefresh={() => setCurrentQ(QUESTIONS[audience][qType][Math.floor(Math.random() * QUESTIONS[audience][qType].length)])} currentPlayer={currentP} />;
                    case 8: return <ScreenSummary stats={stats} pCount={players.length} />;
                }
            };

            return (
                <div className="h-screen w-full bg-[#14002E] text-right flex flex-col relative overflow-hidden" dir="rtl">
                    <Background /><InstructionsModal isOpen={isInfoOpen} onClose={() => setIsInfoOpen(false)} />
                    <header className="p-4 md:p-6 flex justify-between items-center z-[100] relative shrink-0">
                        {/* Right: Logo */}
                        <button onClick={() => setScreen(1)} className="flex items-center gap-2 opacity-60 hover:opacity-100 pointer-events-auto shrink-0 transition-opacity order-first">
                            <span className="text-xl">🧀</span><span className="text-white font-bold hidden md:block">מי הזיז את הגבינה שלי</span>
                        </button>
                        
                        {/* Left: Buttons */}
                        <div className="flex gap-2 md:gap-3 pointer-events-auto">
                            <button onClick={() => setIsInfoOpen(true)} className="flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/10 text-white border border-white/20 font-medium text-xs md:text-sm backdrop-blur-md hover:bg-white/20 transition-all"><Icons.Info /> הוראות</button>
                            {screen > 3 && screen < 8 && <button onClick={() => setScreen(8)} className="bg-white/5 text-white/70 px-4 py-1.5 rounded-full border border-white/10 text-xs md:text-sm backdrop-blur-md hover:bg-white/10 transition-colors">סיים משחק</button>}
                        </div>
                    </header>
                    <main className="relative flex-1 flex flex-col overflow-hidden text-center">
                        <AnimatePresence mode="wait"><motion.div className="flex-1 flex flex-col" key={screen} initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} exit={{ opacity: 0, x: -20 }}>{renderContent()}</motion.div></AnimatePresence>
                    </main>
                    <footer className="p-4 text-center z-50 relative pointer-events-none shrink-0 text-center"><a href="https://www.pisgah.org.il/" target="_blank" rel="noopener noreferrer" className="pointer-events-auto inline-flex items-center gap-2 text-white/20 hover:text-[#FACC15] text-xs transition-colors">באהבה מפסג"ה חדרה <Icons.External /></a></footer>
                </div>
            );
        }

        const ScreenRoulette = ({ onNext, players, currentPlayer }) => {
            const [rotation, setRotation] = useState(0);
            useEffect(() => {
                const slice = 360 / players.length;
                const selectedIndex = players.indexOf(currentPlayer.name);
                setRotation((360 * 6) + (360 - (selectedIndex * slice + slice / 2)));
                setTimeout(onNext, 5000);
            }, []);
            return (
                <div className="flex-1 flex flex-col items-center justify-center overflow-hidden text-center p-4 text-center">
                    <div className="relative w-64 h-64 md:w-[450px] md:h-[450px] mx-auto shrink-0 mb-10 text-center text-center">
                        <div className="absolute -top-8 left-1/2 -translate-x-1/2 z-40 text-center"><svg width="40" height="40" viewBox="0 0 24 24" fill="#FACC15"><path d="M12 21L2 5h20z" /></svg></div>
                        <motion.div animate={{ rotate: rotation }} transition={{ duration: 4.5, ease: [0.12, 0.8, 0.2, 1] }} className="w-full h-full relative z-10 text-center">
                            <svg viewBox="0 0 100 100" className="w-full h-full drop-shadow-2xl">
                                {players.map((p, i) => {
                                    const slice = 360 / players.length;
                                    const radsS = (i * slice - 90) * Math.PI / 180.0;
                                    const radsE = ((i + 1) * slice - 90) * Math.PI / 180.0;
                                    const d = `M 50 50 L ${50 + 50 * Math.cos(radsS)} ${50 + 50 * Math.sin(radsS)} A 50 50 0 0 1 ${50 + 50 * Math.cos(radsE)} ${50 + 50 * Math.sin(radsE)} Z`;
                                    return (
                                        <g key={i}>
                                            <path d={d} fill={i % 2 === 0 ? '#6D28D9' : '#5B21B6'} stroke="#FACC15" strokeWidth="0.5" />
                                            <text x="50" y="12" transform={`rotate(${i * slice + slice / 2} 50 50)`} fill="white" fontSize={players.length > 8 ? "3.5" : "4.5"} fontWeight="900" textAnchor="middle">{p}</text>
                                        </g>
                                    );
                                })}
                            </svg>
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 md:w-24 md:h-24 bg-[#14002E] rounded-full flex items-center justify-center border-2 border-[#FACC15] text-3xl z-20 shadow-inner text-center"></div>
                        </motion.div>
                    </div>
                    <h2 className="text-2xl md:text-3xl font-black text-white tracking-widest animate-pulse mt-4 text-center">הגבינה מסתובבת...</h2>
                </div>
            );
        };

        const ScreenQuestionType = ({ onSelectType, currentPlayer }) => {
            const constraintsRef = useRef(null);
            const x = useMotionValue(0);
            const y = useMotionValue(0);
            const rG = useTransform(x, [40, 120], [0, 0.7]);
            const cG = useTransform(y, [-120, -40], [0.8, 0]);
            const lG = useTransform(x, [-120, -40], [0.7, 0]);
            const CardStyle = "w-28 h-44 md:w-44 md:h-64 flex flex-col items-center justify-center p-3 text-center border border-white/10";
            return (
                <div className="flex-1 flex flex-col items-center justify-center w-full max-w-5xl mx-auto px-4 text-center text-center text-center" ref={constraintsRef}>
                    <h2 className="text-2xl md:text-5xl font-bold text-white mb-3 text-center"><span className="text-[#FACC15]">{currentPlayer.name}</span>, לאן נזיז את הגבינה?</h2>
                    <p className="text-sm md:text-lg text-[#E9D5FF]/60 mb-6 text-center">גרור/י את הגבינה כלפי מעלה אל הקלף הנבחר</p>
                    <div className="relative w-full flex flex-col items-center gap-10 overflow-visible mt-4 text-center">
                        <div className="flex justify-center items-end gap-3 md:gap-6 overflow-visible text-center">
                            <div className="relative"><motion.div style={{ opacity: rG }} className="absolute inset-0 bg-orange-500 blur-[40px] rounded-full" />
                                <GlassCard className={`${CardStyle} border-orange-400/20 bg-orange-500/5`}>
                                    <div className="mb-8"><Icons.BookOpen color="#FACC15" size={52} /></div>
                                    <span className="text-sm md:text-xl font-bold text-white leading-tight">קלף הסיפור</span>
                                </GlassCard></div>
                            <div className="relative"><motion.div style={{ opacity: cG }} className="absolute inset-0 bg-blue-500 blur-[40px] rounded-full" />
                                <GlassCard className={`${CardStyle} border-blue-400/30 bg-blue-500/5`}>
                                    <div className="mb-8"><Icons.Heart color="#FACC15" size={52} /></div>
                                    <span className="text-sm md:text-xl font-bold text-white leading-tight">קלף השיתוף</span>
                                </GlassCard></div>
                            <div className="relative"><motion.div style={{ opacity: lG }} className="absolute inset-0 bg-[#FACC15] blur-[40px] rounded-full" />
                                <GlassCard className={`${CardStyle} border-[#FACC15]/20 bg-[#FACC15]/5`}>
                                    <div className="mb-8"><Icons.Zap color="#FACC15" size={52} /></div>
                                    <span className="text-sm md:text-xl font-black text-white leading-tight">קלף האומץ</span>
                                </GlassCard></div>
                        </div>
                        <div className="h-20 shrink-0 text-center"><motion.div drag dragConstraints={constraintsRef} dragElastic={0.1} onDragEnd={(_, info) => { if (info.offset.y < -50) { if (info.offset.x > 60) onSelectType('story'); else if (info.offset.x < -60) onSelectType('courage'); else onSelectType('sharing'); } }} style={{ x, y }} className="cursor-grab text-7xl md:text-9xl drop-shadow-[0_10px_30px_rgba(250,204,21,0.5)] text-center">🧀</motion.div></div>
                        <div className="text-[#FACC15] animate-pulse flex items-center gap-2 text-sm justify-center"><Icons.ArrowUp /> גרור/י למעלה לבחירה</div>
                    </div>
                </div>
            );
        };

        const ScreenQuestion = ({ onEndTurn, question, type, onRefresh, currentPlayer }) => {
            const [isP, setIsP] = useState(false);
            const conf = { sharing: { l: 'קלף השיתוף', i: Icons.Heart, c: 'from-blue-500/20', a: 'text-blue-200' }, story: { l: 'קלף הסיפור', i: Icons.BookOpen, c: 'from-orange-500/20', a: 'text-orange-200' }, courage: { l: 'קלף האומץ', i: Icons.Zap, c: 'from-[#FACC15]/20', a: 'text-[#FACC15]' } }[type];
            return (
                <div className="flex-1 flex flex-col items-center justify-center w-full max-w-4xl mx-auto px-6 text-center text-center">
                    <AnimatePresence mode="wait text-center">{!isP ? (
                        <motion.div key="q" className="w-full flex flex-col items-center text-center text-center">
                            <GlassCard className={`p-8 md:p-12 min-h-[250px] flex flex-col items-center justify-center w-full bg-gradient-to-b ${conf.c} to-transparent border-[#FACC15]/10 shadow-2xl text-center`}>
                                <div className={`mb-6 flex items-center gap-3 ${conf.a} font-black text-xl md:text-3xl justify-center text-center`}><conf.i color="#FACC15" size={40}/> {conf.l}</div>
                                <h2 className="text-xl md:text-4xl font-bold text-white leading-relaxed text-center">{question}</h2>
                            </GlassCard>
                            <div className="flex flex-col md:flex-row gap-4 mt-10 justify-center text-center"><button onClick={onRefresh} className="bg-white/10 text-white border border-white/20 px-8 py-3 rounded-full flex items-center gap-2 hover:bg-white/20 transition-all text-sm justify-center text-center text-center"><Icons.Refresh /> החלף/י קלף</button><ButtonPrimary onClick={() => setIsP(true)} icon={Icons.Users} className="min-w-[280px]">זמן מעגל עמיתים</ButtonPrimary></div>
                        </motion.div>
                    ) : (
                        <motion.div key="p" className="w-full flex flex-col items-center text-center text-center">
                            <GlassCard className="p-8 md:p-14 w-full border-[#FACC15]/20 bg-white/[0.02] text-center">
                                <h3 className="text-2xl md:text-4xl font-bold text-[#FACC15] mb-6 text-center">זמן מעגל עמיתים</h3>
                                <p className="text-xl md:text-2xl text-white/80 mb-12 text-center">לאחר השיתוף, 3 משתתפים/ות מוזמנים/ות להגיב ל{currentPlayer.name}:</p>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-center">
                                    <div className="bg-white/5 border border-white/10 p-6 rounded-3xl flex flex-col items-center gap-3 text-center text-center"><Icons.Lightbulb color="#FACC15" size={40}/><span className="text-xl font-bold text-white text-center">לייעץ</span></div>
                                    <div className="bg-white/5 border border-white/10 p-6 rounded-3xl flex flex-col items-center gap-3 text-center text-center"><Icons.ShareBubbles color="#93c5fd" size={40}/><span className="text-xl font-bold text-white text-center">לשתף</span></div>
                                    <div className="bg-white/5 border border-white/10 p-6 rounded-3xl flex flex-col items-center gap-3 text-center text-center"><Icons.Heart color="#f9a8d4" size={40}/><span className="text-xl font-bold text-white text-center">לחזק</span></div>
                                </div>
                            </GlassCard>
                            <div className="mt-12 flex justify-center text-center text-center"><ButtonPrimary onClick={onEndTurn} icon={Icons.Refresh}>סיימנו, סובב/י למי הבא!</ButtonPrimary></div>
                        </motion.div>
                    )}</AnimatePresence>
                </div>
            );
        };

        const ScreenSummary = ({ stats, pCount }) => (
            <div className="flex-1 flex flex-col items-center justify-center text-center px-6 text-center text-center text-center">
                <div className="flex justify-center scale-75 md:scale-100 text-center text-center text-center"><Icons.Trophy /></div>
                <h1 className="text-4xl md:text-6xl font-black text-white mb-4 mt-6 text-center">היה מדהים!</h1>
                <p className="text-2xl text-[#E9D5FF] mb-10 text-center">למדתם/ן שלא צריך לפחד משינויים</p>
                <div className="flex gap-4 mb-12 justify-center text-center text-center text-center">
                    <GlassCard className="p-6 px-10 flex flex-col items-center min-w-[150px] text-center text-center text-center text-center"><span className="text-4xl font-bold text-[#FACC15] mb-1 text-center">{pCount}</span><span className="text-white/60 text-sm text-center">משתתפים/ות</span></GlassCard>
                    <GlassCard className="p-6 px-10 flex flex-col items-center min-w-[150px] text-center text-center text-center text-center"><span className="text-4xl font-bold text-[#6D28D9] mb-1 text-center">{stats.questionsAnswered}</span><span className="text-white/60 text-sm text-center">שאלות</span></GlassCard>
                </div>
                <div className="flex justify-center text-center"><ButtonPrimary onClick={() => window.location.reload()} icon={Icons.Refresh}>משחק חדש</ButtonPrimary></div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = { apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: "" };
        window.FB_INIT = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, updateDoc, increment, onSnapshot, firebaseConfig };
    </script>
</body>
</html>
